<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta de desafíos creativos</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #FBE4EC 0%, #FDF1DD 35%, #E3F1F7 70%, #EFE4F5 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 20px; position: relative; overflow: hidden;
    font-family: 'Source Sans 3', sans-serif;
  }
  .display { font-family: 'Fraunces', serif; }
  .fondo {
    position: fixed; inset: 0; pointer-events: none; opacity: 0.45; filter: blur(0.3px);
    background-image:
      radial-gradient(ellipse 180px 140px at 6% 10%, #F4A6C6 0%, transparent 70%),
      radial-gradient(ellipse 160px 130px at 92% 8%, #A8D8E8 0%, transparent 70%),
      radial-gradient(ellipse 170px 140px at 8% 92%, #F7CB7B 0%, transparent 70%),
      radial-gradient(ellipse 180px 140px at 94% 90%, #CBA8E0 0%, transparent 70%);
  }
  .container { max-width: 430px; width: 100%; position: relative; z-index: 1; text-align: center; }
  .label { color: #D9678C; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; display: block; }
  h1 { color: #5B4B6E; font-size: 25px; font-weight: 600; margin-bottom: 10px; line-height: 1.25; }
  .subtitle { color: #7C7191; font-size: 14.5px; line-height: 1.6; margin-bottom: 24px; }
  .ruleta-wrap { position: relative; width: 280px; height: 280px; margin: 0 auto 24px; }
  .puntero {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 22px solid #5B4B6E;
    z-index: 3;
  }
  #ruleta { width: 280px; height: 280px; border-radius: 50%; box-shadow: 0 4px 20px rgba(91,75,110,0.2); }
  .centro {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: #FFFCFA; border: 4px solid #F0E0EC;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; z-index: 2;
  }
  .btn-girar {
    padding: 16px 32px; border-radius: 14px; border: none;
    background: #5B4B6E; color: #FFFCFA; font-size: 16px; font-weight: 600;
    cursor: pointer; font-family: 'Source Sans 3', sans-serif;
    width: 100%; margin-bottom: 16px;
  }
  .btn-girar:disabled { background: #B8A8C8; cursor: default; }
  .desafio-card {
    background: #FFFCFA; border-radius: 20px; padding: 26px 24px;
    margin-bottom: 20px; box-shadow: 0 2px 20px rgba(91,75,110,0.1);
    border-left: 6px solid #F4A6C6;
    display: none;
  }
  .desafio-emoji { font-size: 32px; margin-bottom: 10px; display: block; }
  .desafio-texto { color: #5B4B6E; font-size: 18px; font-weight: 600; line-height: 1.5; font-family: 'Fraunces', serif; }
</style>
</head>
<body>
<div class="fondo"></div>
<div class="container">
  <span class="label display">Capítulo 9 · Regalo</span>
  <h1 class="display">Ruleta de desafíos creativos</h1>
  <p class="subtitle">Girá la ruleta y aparece un desafío para crear algo propio.</p>

  <div class="ruleta-wrap">
    <div class="puntero"></div>
    <svg id="ruleta" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M100,100 L100,0 A100,100 0 0,1 161.8,19.1 Z" fill="#FF6B6B"/>
      <path d="M100,100 L161.8,19.1 A100,100 0 0,1 195,69.1 Z" fill="#FF9F43"/>
      <path d="M100,100 L195,69.1 A100,100 0 0,1 190.2,130.9 Z" fill="#F7CB7B"/>
      <path d="M100,100 L190.2,130.9 A100,100 0 0,1 161.8,180.9 Z" fill="#6BCB77"/>
      <path d="M100,100 L161.8,180.9 A100,100 0 0,1 100,200 Z" fill="#4ECDC4"/>
      <path d="M100,100 L100,200 A100,100 0 0,1 38.2,180.9 Z" fill="#45B7D1"/>
      <path d="M100,100 L38.2,180.9 A100,100 0 0,1 9.8,130.9 Z" fill="#9B59B6"/>
      <path d="M100,100 L9.8,130.9 A100,100 0 0,1 5,69.1 Z" fill="#F4A6C6"/>
      <path d="M100,100 L5,69.1 A100,100 0 0,1 38.2,19.1 Z" fill="#E84393"/>
      <path d="M100,100 L38.2,19.1 A100,100 0 0,1 100,0 Z" fill="#A8E6CF"/>
      <text x="130" y="35" font-size="13" text-anchor="middle">📸</text>
      <text x="162" y="68" font-size="13" text-anchor="middle">🎙️</text>
      <text x="165" y="110" font-size="13" text-anchor="middle">📷</text>
      <text x="150" y="155" font-size="13" text-anchor="middle">🗣️</text>
      <text x="115" y="175" font-size="13" text-anchor="middle">🔊</text>
      <text x="75" y="170" font-size="13" text-anchor="middle">✏️</text>
      <text x="45" y="148" font-size="13" text-anchor="middle">💃</text>
      <text x="35" y="108" font-size="13" text-anchor="middle">🎬</text>
      <text x="48" y="65" font-size="13" text-anchor="middle">🎥</text>
      <text x="78" y="35" font-size="13" text-anchor="middle">📖</text>
    </svg>
    <div class="centro">🎯</div>
  </div>

  <div class="desafio-card" id="desafio-card">
    <span class="desafio-emoji" id="desafio-emoji"></span>
    <p class="desafio-texto display" id="desafio-texto"></p>
  </div>

  <button class="btn-girar" id="btn-girar" onclick="girar()">🎯 Girar la ruleta</button>
</div>

<script>
  var desafios = [
    { emoji: "📸", texto: "Dibujá un personaje que inventaste vos y sacale una foto." },
    { emoji: "🎙️", texto: "Grabá un mensaje de voz contando lo que hiciste hoy." },
    { emoji: "📷", texto: "Sacá tres fotos de cosas que te llamen la atención en este momento." },
    { emoji: "🗣️", texto: "Inventá una historia con tres objetos que tengas cerca y contásela a alguien." },
    { emoji: "🔊", texto: "Grabá el sonido más raro que puedas encontrar a tu alrededor." },
    { emoji: "✏️", texto: "Hacé un dibujo de lo que soñaste o te imaginás y contanos qué es." },
    { emoji: "💃", texto: "Elegí una canción y bailala inventando los pasos vos." },
    { emoji: "🎬", texto: "Armá una escena con juguetes o materiales y sacale una foto como si fuera una película." },
    { emoji: "🎥", texto: "Grabá un video de algo que querés mostrarle a alguien que querés." },
    { emoji: "📖", texto: "Inventá un final diferente para un cuento que ya conocés y contáselo a alguien." }
  ];

  var rotacion = 0;
  var girando = false;
  var ultimo = -1;

  function girar() {
    if (girando) return;
    girando = true;

    var btn = document.getElementById('btn-girar');
    btn.disabled = true;
    btn.textContent = 'Girando...';

    var idx;
    do { idx = Math.floor(Math.random() * 10); } while (idx === ultimo && 10 > 1);
    ultimo = idx;

    var vueltas = 4 + Math.random() * 3;
    var anguloFinal = 360 * vueltas - (idx * 36 + 18);
    rotacion += anguloFinal - (rotacion % 360);

    var ruleta = document.getElementById('ruleta');
    ruleta.style.transition = 'transform 3.2s cubic-bezier(0.17,0.84,0.31,1)';
    ruleta.style.transform = 'rotate(' + rotacion + 'deg)';

    setTimeout(function() {
      var d = desafios[idx];
      document.getElementById('desafio-emoji').textContent = d.emoji;
      document.getElementById('desafio-texto').textContent = d.texto;
      document.getElementById('desafio-card').style.display = 'block';

      btn.disabled = false;
      btn.textContent = '↺ Girar de nuevo';
      girando = false;
    }, 3400);
  }
</script>
</body>
</html>
